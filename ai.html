<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Mixing Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #fff7fb, #f4f7ff);
  color: #2d2d2d;
  padding: 20px;
  margin: auto;
  max-width: 800px;
}

    .game-container {
      width: 100%;
      max-width: 760px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
      padding: 28px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      margin-top: 0;
      color: #666;
      margin-bottom: 24px;
    }

    .top-bar {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 24px;
    }

    .stat-box {
      background: #f7f8fc;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      border: 1px solid #e7eaf4;
      width: 160px;
      padding: 18px;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
    }

    .colors-area {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 26px;
    }

    .color-card {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 22px;
      padding: 16px;
      text-align: center;
    }

    .swatch {
      width: 100%;
      height: 150px;
      border-radius: 18px;
      border: 3px solid rgba(0, 0, 0, 0.08);
      margin-bottom: 12px;
    }

    .plus-sign {
      font-size: 2.6rem;
      font-weight: bold;
      color: #999;
    }

    .prompt {
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 14px;
    }

    .hint {
      text-align: center;
      color: #666;
      margin-bottom: 18px;
      min-height: 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 18px;
    }

    input[type="text"] {
      width: min(100%, 340px);
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #cfd5e4;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #8c9eff;
      box-shadow: 0 0 0 3px rgba(140, 158, 255, 0.18);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .submit-btn {
      background: #7c90ff;
      color: white;
    }

    .message {
      text-align: center;
      font-weight: bold;
      min-height: 28px;
      margin-bottom: 6px;
    }

    .message.correct {
      color: #18804b;
    }

    .message.incorrect {
      color: #b42318;
    }

    .possible-answers {
      margin-top: 18px;
      background: #fafbff;
      border: 1px solid #e3e8fb;
      border-radius: 16px;
      padding: 14px;
      color: #555;
      line-height: 1.6;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .modal h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .modal p {
      margin: 8px 0;
      color: #555;
      line-height: 1.5;
    }

    .streak-number {
      font-size: 2.6rem;
      font-weight: bold;
      color: #7c90ff;
      margin: 14px 0;
    }

    .restart-btn {
      background: #7c90ff;
      color: white;
      margin-top: 16px;
      width: 100%;
    }

    @media (max-width: 640px) {
      .top-bar {
        grid-template-columns: 1fr;
      }

      .colors-area {
        grid-template-columns: 1fr;
      }

      .plus-sign {
        transform: rotate(90deg);
      }

      .game-container {
        padding: 20px;
      }
    }


header {
  margin-bottom: 18px;
}

nav {
  display: flex;
  justify-content: flex-start;
  gap: 0;
  border-radius: .5em;
  overflow: hidden;
  width: fit-content;
}

nav a {
  display: block;
  background-color: black;
  color: white;
  padding: 0.5em 1em;
  text-decoration: none;
}

nav a:hover {
  background-color: gray;
  color: black;
}
  </style>
</head>
<body>
  <div class="page-container">
    <header>
      <nav class="common">
        <a href="index.html">Resume</a>
        <a href="fromscratch.html">Barbie Movies</a>
      </nav>
    </header>
    </div>
    <div class="game-container">
    <h1>Color Mixing Challenge</h1>
    <p class="subtitle">Type the color created when these two colors mix.</p>

    <div class="top-bar">
      <div class="stat-box">
        <div class="stat-label">Current Streak</div>
        <div class="stat-value" id="streak">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Difficulty</div>
        <div class="stat-value" id="difficulty">Easy</div>
      </div>
    </div>

    <div class="colors-area">
      <div class="color-card">
        <div class="swatch" id="swatch1"></div>
        <div id="label1">Red</div>
      </div>

      <div class="plus-sign">+</div>

      <div class="color-card">
        <div class="swatch" id="swatch2"></div>
        <div id="label2">Blue</div>
      </div>
    </div>

    <div class="prompt">What color do these make?</div>
    <div class="hint" id="hint"></div>

    <div class="input-row">
      <input type="text" id="answerInput" placeholder="Type your answer here" autocomplete="off" />
      <button class="submit-btn" id="submitBtn">Submit</button>
    </div>

    <div class="message" id="message"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Round Over</h2>
      <p>Your streak was:</p>
      <div class="streak-number" id="finalStreak">0</div>
      <p id="correctAnswerText">Correct answer: Purple</p>
      <p>Better Luck Next Time!</p>
      <button class="restart-btn" id="restartBtn">Try Again</button>
    </div>
  </div>

  <script>
const easyRounds = [
  { c1: 'red', c2: 'blue', answer: 'purple', synonyms: ['violet'] },
  { c1: 'blue', c2: 'yellow', answer: 'green', synonyms: ['lime green'] },
  { c1: 'red', c2: 'yellow', answer: 'orange', synonyms: [] },
  { c1: 'red', c2: 'white', answer: 'pink', synonyms: ['light pink'] },
  { c1: 'black', c2: 'white', answer: 'gray', synonyms: ['grey', 'gray'] },
  { c1: 'blue', c2: 'white', answer: 'sky blue', synonyms: ['light blue'] },
  { c1: 'yellow', c2: 'white', answer: 'cream', synonyms: ['pale yellow'] },
  { c1: 'green', c2: 'white', answer: 'mint', synonyms: ['mint green', 'light green'] },
  { c1: 'red', c2: 'black', answer: 'dark red', synonyms: ['deep red'] },
  { c1: 'blue', c2: 'black', answer: 'navy', synonyms: ['dark blue', 'navy blue'] },
  { c1: 'yellow', c2: 'black', answer: 'olive', synonyms: ['olive green'] },
  { c1: 'red', c2: 'gray', answer: 'dusty rose', synonyms: ['rose gray', 'rose grey'] },
  { c1: 'blue', c2: 'gray', answer: 'blue gray', synonyms: ['blue grey', 'grey blue', 'blue gray', 'gray blue'] },
  { c1: 'green', c2: 'yellow', answer: 'yellow green', synonyms: ['lime', 'green yellow'] },
  { c1: 'orange', c2: 'white', answer: 'peach', synonyms: ['light orange'] }
];

const mediumRounds = [
  { c1: 'blue', c2: 'green', answer: 'teal', synonyms: ['blue green', 'green blue'] },
  { c1: 'red', c2: 'white', answer: 'rose', synonyms: ['pink rose'] },
  { c1: 'red', c2: 'blue', answer: 'magenta', synonyms: ['reddish purple'] },
  { c1: 'yellow', c2: 'green', answer: 'lime green', synonyms: ['lime'] },
  { c1: 'blue', c2: 'purple', answer: 'indigo', synonyms: [] },
  { c1: 'red', c2: 'orange', answer: 'vermilion', synonyms: ['red orange', 'orange red'] },
  { c1: 'blue', c2: 'white', answer: 'cyan', synonyms: ['aqua'] },
  { c1: 'green', c2: 'blue', answer: 'turquoise', synonyms: [] },
  { c1: 'red', c2: 'purple', answer: 'fuchsia', synonyms: ['hot pink'] },
  { c1: 'yellow', c2: 'orange', answer: 'amber', synonyms: ['golden orange'] },
  { c1: 'green', c2: 'gray', answer: 'sage', synonyms: ['sage green'] },
  { c1: 'brown', c2: 'red', answer: 'rust', synonyms: ['rust red'] },
  { c1: 'pink', c2: 'white', answer: 'blush', synonyms: ['pale pink'] },
  { c1: 'orange', c2: 'yellow', answer: 'gold', synonyms: ['golden yellow'] },
  { c1: 'purple', c2: 'white', answer: 'lavender', synonyms: ['light purple'] }
];

const hardRounds = [
  { c1: 'pink', c2: 'orange', answer: 'coral', synonyms: [] },
  { c1: 'yellow', c2: 'green', answer: 'chartreuse', synonyms: ['bright green'] },
  { c1: 'blue', c2: 'gray', answer: 'slate', synonyms: ['slate gray', 'slate grey', 'slate blue'] },
  { c1: 'purple', c2: 'pink', answer: 'orchid', synonyms: [] },
  { c1: 'red', c2: 'brown', answer: 'maroon', synonyms: ['burgundy'] },
  { c1: 'blue', c2: 'green', answer: 'cerulean', synonyms: [] },
  { c1: 'purple', c2: 'blue', answer: 'periwinkle', synonyms: [] },
  { c1: 'red', c2: 'orange', answer: 'scarlet', synonyms: [] },
  { c1: 'yellow', c2: 'brown', answer: 'mustard', synonyms: ['mustard yellow'] },
  { c1: 'green', c2: 'brown', answer: 'moss', synonyms: ['moss green'] },
  { c1: 'red', c2: 'gray', answer: 'mauve', synonyms: [] },
  { c1: 'blue', c2: 'black', answer: 'midnight blue', synonyms: [] },
  { c1: 'green', c2: 'white', answer: 'seafoam', synonyms: ['seafoam green'] },
  { c1: 'red', c2: 'white', answer: 'salmon', synonyms: [] },
  { c1: 'orange', c2: 'brown', answer: 'burnt sienna', synonyms: [] }
];

    const streakEl = document.getElementById('streak');
    const difficultyEl = document.getElementById('difficulty');
    const swatch1 = document.getElementById('swatch1');
    const swatch2 = document.getElementById('swatch2');
    const label1 = document.getElementById('label1');
    const label2 = document.getElementById('label2');
    const hintEl = document.getElementById('hint');
    const inputEl = document.getElementById('answerInput');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const finalStreakEl = document.getElementById('finalStreak');
    const correctAnswerText = document.getElementById('correctAnswerText');
    const restartBtn = document.getElementById('restartBtn');

    let streak = 0;
    let round = 1;
    let currentQuestion = null;

    let easyBag = [];
    let mediumBag = [];
    let hardBag = [];

    function getDifficulty() {
        if (round <= 6) return 'Easy';
        if (round <= 12) return 'Medium';
        return 'Hard';
    }

    function shuffleArray(array) {
        const shuffled = [...array];

        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }

    return shuffled;
    }

    function refillBag(difficulty) {
        if (difficulty === 'Easy') {
            easyBag = shuffleArray(easyRounds);
        } else if (difficulty === 'Medium') {
             mediumBag = shuffleArray(mediumRounds);
        } else {
            hardBag = shuffleArray(hardRounds);
        }
    }

    function getRandomQuestion() {
        const difficulty = getDifficulty();

  if (difficulty === 'Easy') {
    if (easyBag.length === 0) {
      refillBag('Easy');
    }
    return easyBag.pop();
    }

    if (difficulty === 'Medium') {
        if (mediumBag.length === 0) {
            refillBag('Medium');
            }
        return mediumBag.pop();
    }

    if (hardBag.length === 0) {
        refillBag('Hard');
    }
    return hardBag.pop();
}

    function updateDisplay() {
  streakEl.textContent = streak;
  difficultyEl.textContent = getDifficulty();
}

    function setMessage(text, type = '') {
      messageEl.textContent = text;
      messageEl.className = 'message';
      if (type) {
        messageEl.classList.add(type);
      }
    }

    function loadQuestion() {
      currentQuestion = getRandomQuestion();
      swatch1.style.background = currentQuestion.c1;
      swatch2.style.background = currentQuestion.c2;
      label1.textContent = capitalizeWords(currentQuestion.c1);
      label2.textContent = capitalizeWords(currentQuestion.c2);

      const difficulty = getDifficulty();
      if (difficulty === 'Easy') {
        hintEl.textContent = 'Think of basic paint color combinations.';
      } else if (difficulty === 'Medium') {
        hintEl.textContent = 'The answer may be more specific than a basic color.';
      } else {
        hintEl.textContent = 'These rounds use less obvious color names.';
      }

      inputEl.value = '';
      inputEl.focus();
      setMessage('');
      updateDisplay();
    }

    function normalizeAnswer(text) {
      return text.trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function isCorrectAnswer(userAnswer, question) {
      const normalized = normalizeAnswer(userAnswer);
      if (normalized === normalizeAnswer(question.answer)) return true;
      return question.synonyms.some(synonym => normalizeAnswer(synonym) === normalized);
    }

    function handleCorrect() {
      streak += 1;
      round += 1;
      setMessage('Correct! Nice job — keep your streak going.', 'correct');
      updateDisplay();

      setTimeout(() => {
        loadQuestion();
      }, 700);
    }

function handleWrong() {
  finalStreakEl.textContent = streak;
  correctAnswerText.textContent = `Correct answer: ${capitalizeWords(currentQuestion.answer)}`;
  
  streak = 0;
  round = 1;
  updateDisplay();
  
  modalOverlay.classList.add('show');
}

    function submitAnswer() {
        const userAnswer = inputEl.value;

        if (!userAnswer.trim()) {
        setMessage('Please type an answer first.', 'incorrect');
        return;
    }

    if (isCorrectAnswer(userAnswer, currentQuestion)) {
        inputEl.value = '';
        handleCorrect();
    } else {
        inputEl.value = '';
        setMessage('Not quite.', 'incorrect');
        handleWrong();
    }
    }

function restartGame() {
  modalOverlay.classList.remove('show');
  streak = 0;
  round = 1;
  easyBag = [];
  mediumBag = [];
  hardBag = [];
  updateDisplay(); // updates screen right away
  loadQuestion();
}

    function capitalizeWords(text) {
      return text
        .split(' ')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    submitBtn.addEventListener('click', submitAnswer);

    restartBtn.addEventListener('click', restartGame);

    inputEl.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        submitAnswer();
      }
    });

    loadQuestion();
  </script>
</body>
</html>
